name: Pipeline Compose Run
description: Run GitHub Actions workflows in order — one pipeline file, no generated YAML
branding:
  icon: play
  color: blue
inputs:
  pipeline_file:
    description: Path to pipeline YAML (stage order and wiring)
    required: false
  pipeline_dir:
    description: Directory of pipeline YAML files (merged by pipeline needs)
    required: false
  ref:
    description: Git ref to dispatch stage workflows on (default GITHUB_REF)
    required: false
  github_token:
    description: Token with actions:write to dispatch workflows
    required: false
  repo_tokens_json:
    description: JSON map of owner/repo slugs to tokens for cross-repo stage dispatch
    required: false
    default: '{}'
  github_app_id:
    description: Optional GitHub App ID used for cross-repo stage dispatch token minting
    required: false
  github_app_private_key:
    description: Optional GitHub App private key PEM (supports escaped newlines)
    required: false
  commit_status:
    description: Post commit statuses on the PR head SHA — auto (pull_request only), true, or false
    required: false
    default: auto
  commit_status_sha:
    description: Override commit SHA for status checks (default PR head or GITHUB_SHA)
    required: false
outputs:
  results_json:
    description: JSON array of stage results (id, runId, outputs)
runs:
  using: node24
  main: dist/index.js
